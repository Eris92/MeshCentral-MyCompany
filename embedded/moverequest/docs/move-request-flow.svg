  <g font-family="Arial" font-size="15" fill="#344054"><rect x="76" y="210" width="90" height="38" rx="6" fill="#e5e7eb"/><text x="96" y="235">Actions</text><rect x="174" y="210" width="80" height="38" rx="6" fill="#e5e7eb"/><text x="194" y="235">Notes</text><rect x="262" y="210" width="98" height="38" rx="6" fill="#e5e7eb"/><text x="279" y="235">Log Event</text><rect x="368" y="210" width="76" height="38" rx="6" fill="#e5e7eb"/><text x="390" y="235">Run</text><rect x="76" y="258" width="150" height="42" rx="7" fill="#2f75c9"/><text x="99" y="285" fill="#fff" font-weight="700">Move Request</text></g>
  <rect x="594" y="100" width="554" height="398" rx="14" fill="#fff" stroke="#d0d5dd"/><text x="624" y="140" fill="#1d2939" font-family="Arial" font-size="24" font-weight="700">Move Request</text><text x="624" y="176" fill="#475467" font-family="Arial" font-size="15">The request will be sent for approval before the device is moved.</text><text x="624" y="218" fill="#344054" font-family="Arial" font-size="15">Target group</text><rect x="624" y="230" width="474" height="42" rx="5" fill="#fff" stroke="#98a2b3"/><text x="640" y="257" fill="#344054" font-family="Arial" font-size="15">a</text><path d="m1074 247 8 8 8-8" fill="none" stroke="#344054" stroke-width="2"/><text x="624" y="306" fill="#344054" font-family="Arial" font-size="15">Requester Note</text><rect x="624" y="318" width="474" height="94" rx="5" fill="#fff" stroke="#98a2b3"/><text x="642" y="346" fill="#98a2b3" font-family="Arial" font-size="14">Reason for the move</text><rect x="888" y="438" width="92" height="40" rx="6" fill="#667085"/><text x="910" y="464" fill="#fff" font-family="Arial" font-size="15">Cancel</text><rect x="990" y="438" width="108" height="40" rx="6" fill="#2f75c9"/><text x="1033" y="464" fill="#fff" font-family="Arial" font-size="15" font-weight="700">OK</text>

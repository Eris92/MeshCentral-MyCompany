<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">My Scripts catalog</title><desc id="desc">Server-side scripts arranged in folders and submitted for approval.</desc>
  <rect width="1200" height="620" rx="18" fill="#f4f6f8"/><rect width="1200" height="62" rx="18" fill="#123b63"/><rect y="46" width="1200" height="16" fill="#123b63"/><text x="26" y="40" fill="#fff" font-family="Arial" font-size="25" font-weight="700">MeshCentral · My Scripts</text>
  <rect x="34" y="92" width="268" height="486" rx="12" fill="#172033"/><text x="62" y="132" fill="#fff" font-family="Arial" font-size="21" font-weight="700">Script folders</text><g font-family="Arial" font-size="16"><rect x="50" y="158" width="236" height="54" rx="8" fill="#2d3a55"/><circle cx="78" cy="185" r="12" fill="#62dca4"/><text x="102" y="191" fill="#fff" font-weight="700">Examples</text><text x="62" y="248" fill="#cbd5e1">▸ Active Directory</text><text x="62" y="290" fill="#cbd5e1">▸ Maintenance</text><text x="62" y="332" fill="#cbd5e1">▸ Diagnostics</text></g>
  <rect x="330" y="92" width="836" height="486" rx="12" fill="#fff" stroke="#d0d5dd"/><text x="360" y="136" fill="#1d2939" font-family="Arial" font-size="25" font-weight="700">Examples</text><text x="360" y="166" fill="#667085" font-family="Arial" font-size="15">Choose a script and provide the required variables.</text>
  <g font-family="Arial"><rect x="360" y="198" width="360" height="132" rx="10" fill="#f8fafc" stroke="#d0d5dd"/><text x="386" y="234" fill="#1d2939" font-size="19" font-weight="700">Approval flow test</text><text x="386" y="263" fill="#667085" font-size="14">Harmless script confirming execution after approval.</text><rect x="386" y="284" width="126" height="32" rx="5" fill="#2f75c9"/><text x="414" y="306" fill="#fff" font-size="14" font-weight="700">Request</text><rect x="744" y="198" width="360" height="132" rx="10" fill="#f8fafc" stroke="#d0d5dd"/><text x="770" y="234" fill="#1d2939" font-size="19" font-weight="700">List AD users</text><text x="770" y="263" fill="#667085" font-size="14">Returns a searchable web table with paging.</text><rect x="770" y="284" width="126" height="32" rx="5" fill="#2f75c9"/><text x="798" y="306" fill="#fff" font-size="14" font-weight="700">Request</text></g>
  <rect x="360" y="362" width="744" height="174" rx="10" fill="#eef2f6"/><text x="388" y="399" fill="#1d2939" font-family="Arial" font-size="20" font-weight="700">Approval request</text><text x="388" y="432" fill="#475467" font-family="Arial" font-size="15">Variables and requester note are stored; credentials are not.</text><g font-family="Arial" font-size="14" fill="#344054"><rect x="388" y="454" width="220" height="42" rx="5" fill="#fff" stroke="#98a2b3"/><text x="404" y="480">Message</text><rect x="626" y="454" width="220" height="42" rx="5" fill="#fff" stroke="#98a2b3"/><text x="642" y="480">Requester Note</text><rect x="916" y="454" width="160" height="42" rx="6" fill="#2f75c9"/><text x="952" y="480" fill="#fff" font-weight="700">Submit request</text></g>
</svg>

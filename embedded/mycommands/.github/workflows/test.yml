name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Contract tests
        run: node test/mycommands.test.js
      - name: Static checks
        run: node test/static.test.js

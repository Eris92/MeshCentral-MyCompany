<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">My Commands device tab</title><desc id="desc">Command catalog and approval workflow inside a MeshCentral device tab.</desc>
  <rect width="1200" height="600" rx="18" fill="#f4f6f8"/><rect width="1200" height="62" rx="18" fill="#123b63"/><rect y="46" width="1200" height="16" fill="#123b63"/><text x="26" y="40" fill="#fff" font-family="Arial" font-size="25" font-weight="700">MeshCentral · mc_TestKL</text>
  <g font-family="Arial" font-size="15" font-weight="600"><rect x="36" y="86" width="94" height="38" rx="5" fill="#e5e7eb"/><text x="57" y="111" fill="#344054">General</text><rect x="138" y="86" width="92" height="38" rx="5" fill="#e5e7eb"/><text x="157" y="111" fill="#344054">Desktop</text><rect x="238" y="86" width="92" height="38" rx="5" fill="#e5e7eb"/><text x="257" y="111" fill="#344054">Terminal</text><rect x="338" y="86" width="110" height="38" rx="5" fill="#2f75c9"/><text x="361" y="111" fill="#fff">Commands</text></g>
  <rect x="36" y="148" width="1128" height="406" rx="14" fill="#fff" stroke="#d0d5dd"/>
  <rect x="58" y="172" width="230" height="358" rx="8" fill="#eef2f6"/><text x="80" y="207" fill="#1d2939" font-family="Arial" font-size="20" font-weight="700">Catalog</text><g font-family="Arial" font-size="15" fill="#344054"><text x="80" y="246">▾ Network</text><text x="102" y="278">Flush DNS</text><text x="102" y="308">Renew DHCP</text><text x="80" y="348">▸ System</text><text x="80" y="388">▾ Scripts</text><text x="102" y="420">Active Directory</text><text x="102" y="452">Diagnostics</text><text x="80" y="492">▸ Custom</text></g>
  <text x="328" y="204" fill="#1d2939" font-family="Arial" font-size="22" font-weight="700">Flush DNS</text><text x="328" y="236" fill="#667085" font-family="Arial" font-size="15">Clears the DNS resolver cache on the selected device.</text><rect x="328" y="270" width="190" height="42" rx="6" fill="#2f75c9"/><text x="366" y="297" fill="#fff" font-family="Arial" font-size="16" font-weight="700">Request command</text>
  <rect x="620" y="190" width="500" height="300" rx="12" fill="#f8fafc" stroke="#d0d5dd"/><text x="650" y="228" fill="#1d2939" font-family="Arial" font-size="20" font-weight="700">Approval request</text><text x="650" y="260" fill="#475467" font-family="Arial" font-size="15">The command runs only after approval.</text><text x="650" y="304" fill="#344054" font-family="Arial" font-size="15">Requester Note</text><rect x="650" y="318" width="440" height="92" rx="5" fill="#fff" stroke="#98a2b3"/><rect x="876" y="430" width="92" height="38" rx="6" fill="#667085"/><text x="899" y="455" fill="#fff" font-family="Arial" font-size="15">Cancel</text><rect x="978" y="430" width="112" height="38" rx="6" fill="#2f75c9"/><text x="1010" y="455" fill="#fff" font-family="Arial" font-size="15" font-weight="700">Submit</text>
  <text x="328" y="360" fill="#475467" font-family="Arial" font-size="16">Hash-verified definition</text><text x="328" y="392" fill="#475467" font-family="Arial" font-size="16">Native agent execution</text><text x="328" y="424" fill="#475467" font-family="Arial" font-size="16">Searchable table result</text>
</svg>
